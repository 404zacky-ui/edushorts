<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EduShorts - Anti-Doomscrolling</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html {
            width: 100%; height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            touch-action: none;
        }
        #app {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        #video-track {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .video-slide {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0; left: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
        }
        .video-slide iframe {
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            transform: scale(1.3);
        }
        #touch-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 10;
        }
        #ui-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 20;
            pointer-events: none;
        }
        .side-controls {
            position: absolute;
            right: 15px;
            bottom: 30%;
            display: flex;
            flex-direction: column;
            gap: 20px;
            pointer-events: auto;
        }
        .control-btn {
            width: 60px;
            height: 60px;
            background-color: rgba(0,0,0,0.4);
            border: 2px solid rgba(255,255,255,0.8);
            border-radius: 50%;
            color: white;
            font-size: 28px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: transform 0.1s, background-color 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        #loading {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255,255,255,0.8);
            font-size: 1.1rem;
            z-index: 30;
            pointer-events: none;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="app">
        <div id="loading">Memuat Video Edukasi...<br><small>Tunggu sebentar ya!</small></div>
        <div id="video-track"></div>
        <div id="touch-overlay"></div>
        <div id="ui-layer">
            <div class="side-controls">
                <button class="control-btn" id="mute-btn">🔇</button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. TANGKI KONTEN (15 VIDEO TERPILIH & VALID)
        // ==========================================
        let videoIds = [
            'XqZsoesa55w', // Pinkfong - Baby Shark
            'WRVsOCh907o', // CoComelon - Bath Song
            'PRQL2_n66SU', // CoComelon - Wheels on the Bus
            'vzM7EsQeF1A', // LooLoo Kids - Johny Johny Yes Papa
            'tfo5G18C58M', // Super Simple Songs - Twinkle Twinkle
            'n9pZrx2K6cM', // Pinkfong - If You're Happy
            'yWugM25hK4s', // Lagu Hewan - Old MacDonald
            'fM9T4P7Xvzo', // Numberblocks - Belajar Berhitung
            '27N1L46vPrc', // Alphablocks - Belajar Huruf A-Z
            'dUXk8Nc5qQ8', // Blippi - Edukasi Taman Bermain
            '4PcvG1S8w3U', // Bluey - Klip Animasi Pendek
            '7lb7_W5_B74', // ChuChu TV - Humpty Dumpty
            '020g-0hhCAU', // Pinkfong - T-Rex Song (Dinosaurus)
            'eRBOd-j0vto', // CoComelon - Sick Song
            'as91_N7ZLoc'  // Super Simple Songs - Peekaboo
        ];

        // ==========================================
        // ALGORITMA SHUFFLE (Mengacak urutan video otomatis)
        // ==========================================
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }
        shuffleArray(videoIds); // Acak video setiap kali aplikasi dibuka

        // ==========================================
        // 2. LOGIKA UTAMA YOUTUBE API
        // ==========================================
        const players = [];
        let currentIndex = 0;
        let isMuted = true;
        
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            const track = document.getElementById('video-track');
            
            videoIds.forEach((id, index) => {
                const slide = document.createElement('div');
                slide.className = 'video-slide';
                slide.style.top = `${index * 100}vh`; 
                
                const playerDiv = document.createElement('div');
                playerDiv.id = `player-${index}`;
                
                slide.appendChild(playerDiv);
                track.appendChild(slide);

                const player = new YT.Player(`player-${index}`, {
                    videoId: id,
                    playerVars: {
                        'autoplay': 0,
                        'controls': 0,
                        'disablekb': 1,
                        'fs': 0,
                        'modestbranding': 1,
                        'rel': 0,
                        'playsinline': 1,
                        'loop': 1,
                        'playlist': id
                    },
                    events: {
                        'onReady': onPlayerReady,
                        'onStateChange': onPlayerStateChange
                    }
                });
                players.push(player);
            });
        }

        let playersReadyCount = 0;
        function onPlayerReady(event) {
            playersReadyCount++;
            event.target.mute();
            if (playersReadyCount === videoIds.length) {
                document.getElementById('loading').style.display = 'none';
                players[0].playVideo();
            }
        }

        function onPlayerStateChange(event) {
            if (event.data === YT.PlayerState.ENDED) {
                event.target.playVideo();
            }
        }

        // ==========================================
        // 3. LOGIKA SWIPE NAVIGASI (DENGAN PROTEKSI LOOP)
        // ==========================================
        const overlay = document.getElementById('touch-overlay');
        let startY = 0;
        let endY = 0;
        
        overlay.addEventListener('touchstart', (e) => {
            startY = e.touches[0].clientY;
        }, { passive: true });

        overlay.addEventListener('touchend', (e) => {
            endY = e.changedTouches[0].clientY;
            handleSwipe();
        }, { passive: true });

        function handleSwipe() {
            const swipeDistance = startY - endY;
            const threshold = 50;

            if (swipeDistance > threshold) {
                // Swipe Ke Atas (Video Selanjutnya)
                if (currentIndex < players.length - 1) {
                    changeVideo(currentIndex + 1);
                } else {
                    // Jika video habis, balik otomatis ke video pertama (Looping tak terbatas)
                    changeVideo(0);
                }
            } else if (swipeDistance < -threshold) {
                // Swipe Ke Bawah (Video Sebelumnya)
                if (currentIndex > 0) {
                    changeVideo(currentIndex - 1);
                } else {
                    // Jika di paling atas lalu di-swipe down, pergi ke video paling akhir
                    changeVideo(players.length - 1);
                }
            }
        }

        function changeVideo(newIndex) {
            if (players[currentIndex] && typeof players[currentIndex].pauseVideo === 'function') {
                players[currentIndex].pauseVideo();
            }

            currentIndex = newIndex;

            const track = document.getElementById('video-track');
            track.style.transform = `translateY(-${currentIndex * 100}vh)`;

            if (players[currentIndex] && typeof players[currentIndex].playVideo === 'function') {
                players[currentIndex].playVideo();
            }
        }

        // ==========================================
        // 4. CONTROL TOMBOL MUTE
        // ==========================================
        const muteBtn = document.getElementById('mute-btn');
        muteBtn.addEventListener('click', () => {
            isMuted = !isMuted;
            players.forEach(player => {
                if (typeof player.isMuted === 'function') {
                    if (isMuted) { player.mute(); } else { player.unMute(); }
                }
            });
            muteBtn.innerHTML = isMuted ? '🔇' : '🔊';
        });
    </script>
</body>
</html>
