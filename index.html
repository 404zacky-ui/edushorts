<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EduShorts - Anti-Doomscrolling</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html {
            width: 100%; height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            touch-action: none;
        }
        #app {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        .video-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
        }
        /* VISUAL CROP & PENGUNCIAN IFRAME */
        .video-container iframe {
            width: 100vw;
            height: 100vh;
            pointer-events: none; /* Jari anak tidak bisa menyentuh kontrol internal */
            transform: scale(1.6); /* Potong paksa judul atas dan logo bawah */
        }
        /* TAMENG UTAMA YANG LOCK SCREEN (UNTUK NAVIGASI SWIPE) */
        #touch-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 99999;
            background: rgba(0,0,0,0.001);
        }
    </style>
</head>
<body>
    <div id="app">
        <div id="touch-overlay"></div>
        
        <div class="video-container">
            <iframe 
                id="main-player"
                src="https://www.youtube.com/embed?listType=playlist&list=PL3oW2tjiIxvQ1H8jA3M4aB2lB4c8uX8z1&autoplay=1&controls=0&mute=1&loop=1&shuffle=1&modestbranding=1&rel=0&iv_load_policy=3&playsinline=1&enablejsapi=1" 
                frameborder="0" 
                allow="autoplay; encrypted-media" 
                allowfullscreen>
            </iframe>
        </div>
    </div>

    <script>
        // Memuat YouTube IFrame API agar kita bisa mengontrol tombol "Next Video" lewat swipe jari
        let player;
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('main-player', {
                events: {
                    'onReady': onPlayerReady
                }
            });
        }

        function onPlayerReady(event) {
            // Memastikan fitur acak/shuffle bawaan YouTube diaktifkan setelah pemutar siap
            if (typeof event.target.setShuffle === 'function') {
                event.target.setShuffle(true);
            }
        }

        // LOGIKA NAVIGASI SWIPE (Setiap kali di-swipe ke atas/bawah, pindah ke video berikutnya di playlist)
        const overlay = document.getElementById('touch-overlay');
        let startY = 0;
        let endY = 0;
        
        overlay.addEventListener('touchstart', (e) => {
            startY = e.touches[0].clientY;
        }, { passive: true });

        overlay.addEventListener('touchend', (e) => {
            endY = e.changedTouches[0].clientY;
            handleSwipe();
        }, { passive: true });

        function handleSwipe() {
            const swipeDistance = startY - endY;
            const threshold = 60;

            // Jika di-swipe ke atas atau ke bawah, kita perintahkan player memutar video selanjutnya di playlist
            if (Math.abs(swipeDistance) > threshold) {
                if (player && typeof player.nextVideo === 'function') {
                    player.nextVideo();
                }
            }
        }
    </script>
</body>
</html>
